name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.7.0-beta.1"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  macos:
    name: macOS DMG
    runs-on: macos-14
    needs: test
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac dmg --arm64 --x64 --publish never
      - run: codesign --verify --deep --strict --verbose=2 release/mac-arm64/Goblintown.app
      - run: codesign --verify --deep --strict --verbose=2 release/mac/Goblintown.app
      - run: shasum -a 256 release/*.dmg > release/SHA256SUMS-macos.txt
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/SHA256SUMS-macos.txt

  windows:
    name: Windows NSIS
    runs-on: windows-latest
    needs: test
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win nsis --x64 --arm64 --publish never
      - shell: pwsh
        run: |
          $signatures = Get-AuthenticodeSignature release\*.exe
          $signatures | Format-List Path,Status,SignerCertificate
          if ($signatures.Status -contains "NotSigned") { exit 1 }
      - shell: pwsh
        run: Get-FileHash release\*.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path)" } > release\SHA256SUMS-windows.txt
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/SHA256SUMS-windows.txt

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    needs: test
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux AppImage --x64 --arm64 --publish never
      - run: shasum -a 256 release/*.AppImage > release/SHA256SUMS-linux.txt
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            release/*.AppImage
            release/SHA256SUMS-linux.txt

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
      - linux
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - run: find release-assets -type f -maxdepth 3 -print | sort
      - run: |
          cat > release-notes.md <<'NOTES'
          Goblintown beta desktop installers.

          Use the installer for your platform. The app opens into chat, asks which AI API or local model should power Goblintown, and walks through optional features one at a time.

          macOS builds are Developer ID signed and notarized. Windows builds are Authenticode signed. Linux builds ship as AppImages.
          NOTES
      - run: gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --prerelease --title "Goblintown $RELEASE_TAG" --notes-file release-notes.md
      - run: gh release upload "$RELEASE_TAG" release-assets/**/* --clobber
